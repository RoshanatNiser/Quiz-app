<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- DASHBOARD -->

    <div class="container"
         id="dashboard">

        <div class="topbar">

            <h1>Quiz Navigation</h1>

        </div>

        <div id="quizNavigation"></div>

    </div>

    <!-- QUIZ PAGE -->

    <div class="container hidden"
         id="quizContainer">

        <div class="topbar">

            <h2 id="quizTitle"></h2>

            <div class="timer-box">

                Time Left:
                <span id="timer">60</span>s

            </div>

        </div>

        <div id="questionArea"></div>

        <div class="button-group">

            <button onclick="submitQuiz()">
                Submit Quiz
            </button>

            <button onclick="backToDashboard()">
                Back
            </button>

        </div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
