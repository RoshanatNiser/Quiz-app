<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- AUTH -->

    <div class="container"
         id="authContainer">

        <div class="tabs">

            <button id="signupTab"
                    class="active">
                Sign Up
            </button>

            <button id="loginTab">
                Login
            </button>

        </div>

        <!-- SIGNUP -->

        <div id="signupForm">

            <h2>Create Account</h2>

            <input type="text"
                   id="signupUsername"
                   placeholder="Enter Username">

            <input type="password"
                   id="signupPassword"
                   placeholder="Enter Password">

            <button onclick="signup()">
                Sign Up
            </button>

        </div>

        <!-- LOGIN -->

        <div id="loginForm"
             class="hidden">

            <h2>Login</h2>

            <input type="text"
                   id="loginUsername"
                   placeholder="Enter Username">

            <input type="password"
                   id="loginPassword"
                   placeholder="Enter Password">

            <button onclick="login()">
                Login
            </button>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div class="container hidden"
         id="dashboard">

        <div class="topbar">

            <h2 id="welcomeText"></h2>

            <button onclick="logout()">
                Logout
            </button>

        </div>

        <h1>Quiz Navigation</h1>

        <div id="quizNavigation"></div>

        <hr>

        <h2>Your Performance</h2>

        <div id="scoreBoard"></div>

    </div>

    <!-- QUIZ PAGE -->

    <div class="container hidden"
         id="quizContainer">

        <div class="topbar">

            <h2 id="quizTitle"></h2>

            <div class="timer-box">

                Time Left:
                <span id="timer">60</span>s

            </div>

        </div>

        <div id="questionArea"></div>

        <div class="button-group">

            <button onclick="submitQuiz()">
                Submit Quiz
            </button>

            <button onclick="backToDashboard()">
                Back
            </button>

        </div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
