<script>

    // =====================================
    // DATA STRUCTURE
    // =====================================

    let quizData = {};

    // =====================================
    // ADD QUIZ
    // =====================================

    function addQuiz() {

        const quiz =
            document.getElementById("quizInput")
            .value
            .trim();

        if (!quiz) {

            alert("Enter quiz name");

            return;

        }

        if (quizData[quiz]) {

            alert("Quiz already exists");

            return;

        }

        quizData[quiz] = {};

        document.getElementById("quizInput")
            .value = "";

        updateQuizDropdowns();

        updateJSON();

        renderPreview();

    }

    // =====================================
    // ADD SUBJECT
    // =====================================

    function addSubject() {

        const quiz =
            document.getElementById("quizSelect")
            .value;

        const subject =
            document.getElementById("subjectInput")
            .value
            .trim();

        if (!quiz) {

            alert("Select quiz");

            return;

        }

        if (!subject) {

            alert("Enter subject");

            return;

        }

        if (quizData[quiz][subject]) {

            alert("Subject already exists");

            return;

        }

        quizData[quiz][subject] = [];

        document.getElementById("subjectInput")
            .value = "";

        updateSubjectDropdowns();

        updateJSON();

        renderPreview();

    }

    // =====================================
    // ADD QUESTION
    // =====================================

    function addQuestion() {

        const quiz =
            document.getElementById("questionQuiz")
            .value;

        const subject =
            document.getElementById("questionSubject")
            .value;

        const question =
            document.getElementById("questionText")
            .value
            .trim();

        const option1 =
            document.getElementById("option1")
            .value
            .trim();

        const option2 =
            document.getElementById("option2")
            .value
            .trim();

        const option3 =
            document.getElementById("option3")
            .value
            .trim();

        const option4 =
            document.getElementById("option4")
            .value
            .trim();

        const correct =
            document.getElementById("correctOption")
            .value;

        if (!quiz || !subject) {

            alert("Select quiz and subject");

            return;

        }

        if (!question) {

            alert("Enter question");

            return;

        }

        if (
            !option1 ||
            !option2 ||
            !option3 ||
            !option4
        ) {

            alert("Fill all options");

            return;

        }

        if (!correct) {

            alert("Select correct answer");

            return;

        }

        const options = [

            option1,
            option2,
            option3,
            option4

        ];

        const answer =
            options[correct - 1];

        quizData[quiz][subject]
            .push({

                question: question,

                options: options,

                answer: answer

            });

        clearQuestionFields();

        updateJSON();

        renderPreview();

    }

    // =====================================
    // UPDATE QUIZ DROPDOWNS
    // =====================================

    function updateQuizDropdowns() {

        const quizSelect =
            document.getElementById("quizSelect");

        const questionQuiz =
            document.getElementById("questionQuiz");

        quizSelect.innerHTML =
            `<option value="">
                Select Quiz
            </option>`;

        questionQuiz.innerHTML =
            `<option value="">
                Select Quiz
            </option>`;

        for (let quiz in quizData) {

            const option1 =
                document.createElement("option");

            option1.value = quiz;

            option1.innerText = quiz;

            quizSelect.appendChild(option1);

            const option2 =
                document.createElement("option");

            option2.value = quiz;

            option2.innerText = quiz;

            questionQuiz.appendChild(option2);

        }

    }

    // =====================================
    // UPDATE SUBJECT DROPDOWNS
    // =====================================

    function updateSubjectDropdowns() {

        const quiz =
            document.getElementById("questionQuiz")
            .value;

        const subjectDropdown =
            document.getElementById("questionSubject");

        subjectDropdown.innerHTML =
            `<option value="">
                Select Subject
            </option>`;

        if (!quiz) return;

        for (let subject in quizData[quiz]) {

            const option =
                document.createElement("option");

            option.value = subject;

            option.innerText = subject;

            subjectDropdown.appendChild(option);

        }

    }

    document
        .getElementById("questionQuiz")
        .addEventListener(
            "change",
            updateSubjectDropdowns
        );

    // =====================================
    // UPDATE JSON
    // =====================================

    function updateJSON() {

        document.getElementById(
            "jsonOutput"
        ).value =

        JSON.stringify(
            quizData,
            null,
            2
        );

    }

    // =====================================
    // COPY JSON
    // =====================================

    function copyJSON() {

        const output =
            document.getElementById(
                "jsonOutput"
            );

        output.select();

        navigator.clipboard
            .writeText(output.value);

        alert("JSON copied");

    }

    // =====================================
    // DOWNLOAD JSON
    // =====================================

    function downloadJSON() {

        const json =
            JSON.stringify(
                quizData,
                null,
                2
            );

        const blob =
            new Blob(
                [json],
                {
                    type:
                    "application/json"
                }
            );

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;

        a.download = "questions.json";

        a.click();

        URL.revokeObjectURL(url);

    }

    // =====================================
    // CLEAR FIELDS
    // =====================================

    function clearQuestionFields() {

        document.getElementById(
            "questionText"
        ).value = "";

        document.getElementById(
            "option1"
        ).value = "";

        document.getElementById(
            "option2"
        ).value = "";

        document.getElementById(
            "option3"
        ).value = "";

        document.getElementById(
            "option4"
        ).value = "";

        document.getElementById(
            "correctOption"
        ).value = "";

    }

    // =====================================
    // PREVIEW
    // =====================================

    function renderPreview() {

        const preview =
            document.getElementById(
                "previewArea"
            );

        preview.innerHTML = "";

        for (let quiz in quizData) {

            const quizDiv =
                document.createElement("div");

            quizDiv.innerHTML =
                `<h2>${quiz}</h2>`;

            for (
                let subject
                in quizData[quiz]
            ) {

                const subjectDiv =
                    document.createElement(
                        "div"
                    );

                subjectDiv.innerHTML =
                    `<h3>${subject}</h3>`;

                quizData[quiz][subject]
                    .forEach((q, index) => {

                    const questionDiv =
                        document.createElement(
                            "div"
                        );

                    questionDiv.className =
                        "question-preview";

                    let optionsHTML = "";

                    q.options.forEach(option => {

                        const correct =
                            option === q.answer;

                        optionsHTML += `

                            <div class="${
                                correct
                                ? 'correct'
                                : ''
                            }">

                                ${option}

                            </div>

                        `;

                    });

                    questionDiv.innerHTML = `

                        <strong>

                            Q${index + 1}.
                            ${q.question}

                        </strong>

                        ${optionsHTML}

                    `;

                    subjectDiv.appendChild(
                        questionDiv
                    );

                });

                quizDiv.appendChild(
                    subjectDiv
                );

            }

            preview.appendChild(
                quizDiv
            );

        }

    }

</script>
